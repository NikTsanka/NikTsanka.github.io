<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Radio Bude</title>
	<link rel="icon" type="image/png" href="/img/cover.png" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<!-- Background Elements -->
	<div class="background-cover" id="backgroundCover"></div>
	<div class="background-overlay"></div>

	<!-- Toast Notification -->
	<div class="toast" id="toast"></div>

	<!-- Header -->
	<div class="header">
		<div class="logo">
			<div class="logo-icon">
				<img class="logo-icon" src="/img/cover.png" alt="">
				<i class="fas fa-radio"></i>
			</div>
			<span>Radio Bude</span>
		</div>

		<div class="about-btn">
			<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
				<i class="fas fa-moon" id="themeIcon"></i>
			</button>
			<div class="nav-menu">
				<button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()">
					<i class="fas fa-bars"></i>
				</button>
				<div class="nav-dropdown" id="navDropdown">
					<a href="/DM/website/index.html" target="_blank">
						<button class="about-author-btn gold-accent full-width">
							<span>DM</span>
						</button>
					</a>
					<a href="/service/index.html" target="_blank">
						<button class="about-author-btn gold-accent full-width">
							<span>web service</span>
						</button>
					</a>
					<a href="/nbg/index.html" target="_blank">
						<button class="about-author-btn gold-accent full-width">
							<span>Rates of LARI</span>
						</button>
					</a>
					<a href="/resume/index.html" target="_blank">
						<button class="about-author-btn gold-accent full-width">
							<span>about author</span>
						</button>
					</a>
				</div>
			</div>
			<a href="https://ko-fi.com/canka" target="_blank">
				<button class="about-author-btn gold-accent">
					<i class="fas fa-coffee"></i> <span>support</span>
				</button>
			</a>
		</div>
	</div>

	<!-- Main Container -->
	<div class="main-container">
		<!-- Left Panel - Song History -->
		<div class="left-panel">
			<div class="history-title">Recent Songs</div>
			<div id="songHistory"></div>
			<div class="scroll-fade" id="scrollFade">
				<i class="fas fa-chevron-down"></i>
			</div>
		</div>

		<!-- Right Panel - Current Song -->
		<div class="right-panel">
			<div class="current-cover" id="currentCoverArt"></div>
			<div class="equalizer" id="equalizer">
				<span></span><span></span><span></span><span></span><span></span>
			</div>
			<div class="current-info">
				<div class="song-title-wrapper">
					<h2 id="currentSong" class="current-song">Loading...</h2>
				</div>
				<h3 id="currentArtist" class="current-artist">Please wait</h3>
				<div id="currentAlbum" class="current-album">Connecting to stream...</div>
			</div>
			<button class="share-btn" onclick="shareCurrentSong()" title="Share current song">
				<i class="fas fa-share-alt"></i>
			</button>
		</div>
	</div>

	<!-- Lyrics Tab (desktop) -->
	<div class="lyrics-tab" id="lyricsTab" onclick="toggleLyricsPanel()">
		<i class="fas fa-music"></i>
		<span>LYRICS</span>
	</div>

	<!-- Lyrics Panel -->
	<div class="lyrics-panel" id="lyricsPanel">
		<div class="lyrics-panel-header">
			<h5 id="lyricsSong">Lyrics</h5>
			<button class="lyrics-panel-close" onclick="toggleLyricsPanel()">&times;</button>
		</div>
		<div class="lyrics-panel-body" id="lyric">
			<p>Lyrics will appear here when available...</p>
		</div>
	</div>

	<!-- Shortcuts Popup -->
	<div class="shortcuts-popup" id="shortcutsPopup">
		<div class="shortcuts-title">Keyboard Shortcuts</div>
		<div class="shortcut-item"><kbd>Space</kbd> Play / Pause</div>
		<div class="shortcut-item"><kbd>P</kbd> Play / Pause</div>
		<div class="shortcut-item"><kbd>M</kbd> Mute</div>
		<div class="shortcut-item"><kbd>↑ ↓</kbd> Volume</div>
		<div class="shortcut-item"><kbd>0 – 9</kbd> Volume level</div>
		<div class="shortcut-item"><kbd>L</kbd> Lyrics panel</div>
	</div>

	<!-- Bottom Controls -->
	<div class="bottom-controls">
		<div class="bottom-left">
			<div class="stream-indicator" id="streamIndicator" title="Disconnected"></div>
			<button class="shortcuts-btn" id="shortcutsBtn" onclick="toggleShortcuts()" title="Keyboard shortcuts">?</button>
		</div>

		<button type="button" class="play-button" onclick="togglePlay()">
			<i id="playerButton" class="fa fa-play"></i>
		</button>

		<div class="volume-control">
			<div class="volume-icon">
				<i class="fa fa-volume-up" id="muteIcon" onclick="mute()"></i>
			</div>
			<div class="volume-slider">
				<input type="range" id="volume" step="2" min="0" max="100" value="80" oninput="updateVolume(this.value)">
			</div>
			<div class="volume-value">
				<span id="volIndicator">80</span>%
			</div>
		</div>

		<button class="lyrics-mobile-btn" onclick="toggleLyricsPanel()">
			<i class="fas fa-music"></i>
		</button>

		<div class="bottom-right">
			<button class="sleep-timer-btn" id="sleepTimerBtn" onclick="cycleSleepTimer()" title="Sleep timer: Off">
				<i class="fas fa-moon"></i>
			</button>
		</div>

		<div class="footer-credit">
			&copy; 2026 Radio Bude &middot; Made by <a href="/resume/index.html" target="_blank">NikTsanka</a>
		</div>
	</div>

	<script type="text/javascript" src="js/script.js"></script>
</body>

</html>
